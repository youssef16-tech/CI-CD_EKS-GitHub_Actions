apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-deployment
  labels:
    app: web
    env: production
spec:
  template:
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        # The container name MUST match the base ("web-container"). Strategic-merge
        # patches match list entries by their merge key, and for containers that key is
        # `name`. The original said `web-app`, so instead of patching the base container
        # it ADDED a second one - two containers both binding :3000 -> crash loop.
        - name: web-container
          # Requests trimmed to fit a single t3.small worker node.
          # The original asked for 3 x (500m CPU, 512Mi) = 1.5 vCPU / 1.5Gi *requested*,
          # more than the node can allocate once system pods are placed -> Pending forever.
          # The image and securityContext are intentionally NOT set here: the base already
          # defines runAsUser 1001 (matching the Dockerfile's `nodejs` user), and the image
          # is injected by `kustomize edit set image` in the CD pipeline.
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
