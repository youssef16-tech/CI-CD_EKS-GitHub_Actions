apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: e2ecicd-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-buffering: "on"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  # Removed, and why:
  #   - `host: prod.afraz.dev` + tls/`tls-prod-secret`: a domain and certificate only the
  #     upstream author has. Requests to our LB's own DNS name would never match the rule.
  #   - `ssl-redirect: "true"`: forced http -> https into a certificate that doesn't exist.
  #   - the `/api` path routed to `api-service:8080`, a Service that exists nowhere in
  #     this repo, so that path could only ever return 503.
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-service
                port:
                  number: 80
