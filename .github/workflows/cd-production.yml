name: Production CD Pipeline

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  # Was us-west-2 / e2ecicd-cluster - neither matched what terraform actually builds.
  AWS_REGION: eu-central-1
  EKS_CLUSTER_NAME: e2ecicd-eks-dev
  ECR_REPOSITORY: calculator-app
  K8S_NAMESPACE: app-prod
  NODE_VERSION: 20

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    # Without this job-level block, `needs.build-and-push.outputs.image` is always
    # empty - a step writing to $GITHUB_OUTPUT does NOT automatically expose it.
    outputs:
      image: ${{ steps.build-image.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Run tests
        run: |
          cd app
          npm ci
          npm test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd app
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

  deploy-to-eks:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kustomize
        run: |
          curl -sS "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/
          kustomize version

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region "$AWS_REGION" --name "$EKS_CLUSTER_NAME"

      - name: Ensure namespace exists
        run: kubectl create namespace "$K8S_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

      - name: Point kustomize at the image we just built
        env:
          IMAGE: ${{ needs.build-and-push.outputs.image }}
        run: |
          test -n "$IMAGE" || { echo "image output is empty"; exit 1; }
          cd kustomize/overlays/prod
          # The `oldname=` half is essential. `kustomize edit set image <newimage>` alone
          # just registers an unrelated entry, leaving the deployment on aphraz/node-app -
          # the pipeline would push to ECR and then deploy someone else's public image.
          kustomize edit set image "aphraz/node-app=$IMAGE"
          grep -A3 '^images:' kustomization.yaml

      - name: Deploy to EKS
        run: kubectl apply -k kustomize/overlays/prod/

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/web-deployment -n "$K8S_NAMESPACE" --timeout=300s
          kubectl get pods -l app=web -n "$K8S_NAMESPACE" -o wide

      - name: Confirm the running image is the one we built
        env:
          IMAGE: ${{ needs.build-and-push.outputs.image }}
        run: |
          RUNNING=$(kubectl get deployment web-deployment -n "$K8S_NAMESPACE" \
            -o jsonpath='{.spec.template.spec.containers[0].image}')
          echo "expected: $IMAGE"
          echo "running : $RUNNING"
          [ "$RUNNING" = "$IMAGE" ] || { echo "DEPLOYED THE WRONG IMAGE"; exit 1; }

      - name: Smoke test /health through the ingress load balancer
        run: |
          # The original read .status.loadBalancer.ingress[0].hostname from `web-service`,
          # which is a ClusterIP and therefore never has one. The public entrypoint is the
          # ingress-nginx controller's LoadBalancer.
          LB=$(kubectl get svc ingress-nginx-controller -n ingress-nginx \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          echo "Load balancer: $LB"
          for i in $(seq 1 30); do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "http://$LB/health" || true)
            if [ "$CODE" = "200" ]; then
              echo "Health check passed"
              curl -s "http://$LB/health"; echo
              exit 0
            fi
            echo "attempt $i/30 -> HTTP $CODE, retrying..."
            sleep 10
          done
          echo "Health check never returned 200"
          exit 1
